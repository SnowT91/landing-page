<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Landing Page</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header class="header">
        <div class="container header-container">
            <a href="#home" class="logo">Landing</a>
        
            <nav class="nav" aria-label="Main navigation">
                <a href="#about">About</a>
                <a href="#services">Services</a>
                <a href="#contact">Contact</a>
            </nav>
        </div>
    </header>

    <section id="home" class="hero reveal">
        <div class="container hero-content">
            <h2>Welcome to my website</h2>
            <p>Simple landing page for portfolio</p>
            <a href="#contact" class="hero-btn">Contact Me</a>
        </div>
    </section>

    <section id="about" class="about reveal">
        <div class="container">
            <h2>About Me</h2>
            <p>This is a demo landing page project.</p>
        </div>
    </section>

    <section id="services" class="services reveal">
        <div class="container">
            <h2>Services</h2>
            <p>This is a demo landing page project.</p>
        </div>
    </section>

    <section id="contact" class="contact reveal">
        <div class="container">
            <h2>Contact</h2>
            <form onsubmit="handleSubmit(event)" aria-label="Contaact form">
                <input type="text" name="name" placeholder="Name" required>
                <input type="email" name="email" placeholder="Email" required>
                <button type="submit">Send</button>
            </form>
        </div>
    </section>

    <footer class="footer">
        <p>&copy; 2026 My Portfolio</p>
    </footer>

    <button id="back-to-top" class="back-to-top" aria-label="Back to top">↑</button>
    
    <script src="script.js"></script>
</body>
</html>
