<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Landing Page</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header class="header">
        <div class="container header-container">
            <a href="#home" class="logo">Landing</a>
        
            <nav>
                <a href="#home">Home</a>
                <a href="#about">About</a>
                <a href="#services">Services</a>
                <a href="#contact">Contact</a>
            </nav>
        </div>
    </header>

    <section id="hero">
        <h2>Welcome to my website</h2>
        <p>Simple landing page for portfolio</p>
        <button onclick="scrollToContact()">Contact Me</button>
    </section>

    <section id="home" class="hero reveal">
        <h2>Home</h2>
        <p>This is a demo landing page project.</p>
    </section>

    <section id="about" class="about reveal">
        <h2>About Me</h2>
        <p>This is a demo landing page project.</p>
    </section>

    <section id="services" class="services reveal">
        <h2>Services</h2>
        <p>This is a demo landing page project.</p>
    </section>

    <section id="contact" class="contact reveal">
        <h2>Contact</h2>
        <form onsubmit="handleSubmit(event)">
            <input type="text" placeholder="Name" required>
            <input type="email" placeholder="Email" required>
            <button type="submit">Send</button>
        </form>
    </section>

    <footer>
        <p>&copy; 2026 My Portfolio</p>
    </footer>

    <button id="back-to-top" class="back-to-top" aria-label="Back to top"> </button>
    
    <script src="script.js"></script>
</body>
</html>
